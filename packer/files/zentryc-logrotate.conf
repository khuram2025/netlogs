# /etc/logrotate.d/zentryc — Log rotation for Zentryc application logs

/opt/zentryc/logs/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 640 zentryc zentryc
    sharedscripts
    postrotate
        systemctl reload zentryc-web 2>/dev/null || true
    endscript
}

/opt/zentryc/logs/*.log.[0-9] {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
}
