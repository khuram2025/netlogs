# Zentryc Redis/Valkey Configuration
# Used for: sessions, cache, rate limiting, log streams, task queue

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence - AOF for Redis Streams durability
appendonly yes
appendfsync everysec

# RDB snapshots
save 60 1000
save 300 100

# Network
bind 0.0.0.0
protected-mode no
tcp-keepalive 300
timeout 0

# Performance
hz 10
databases 4
