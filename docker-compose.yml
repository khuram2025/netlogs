services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Structured data (users, rules, devices, etc.)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zentryc}
      POSTGRES_USER: ${POSTGRES_USER:-zentryc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMeNow!}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zentryc} -d ${POSTGRES_DB:-zentryc}"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # ClickHouse - Log storage and analytics
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ChangeMeNow!}
    # Port 8123 bound to localhost only; web connects via Docker network
    ports:
      - "${CLICKHOUSE_EXTERNAL_PORT:-127.0.0.1:8124}:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # PgBouncer - PostgreSQL connection pooler
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    volumes:
      - ./docker/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer-userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Redis/Valkey - Sessions, cache, rate limiting, log streams, task queue
  # ---------------------------------------------------------------------------
  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "/etc/valkey/valkey.conf"]
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis.conf:/etc/valkey/valkey.conf:ro
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Web - FastAPI application (also handles DB init + seeding)
  # ---------------------------------------------------------------------------
  web:
    build: .
    image: zentryc:latest
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY:-}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - TZ=${TZ:-Asia/Riyadh}
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=6432
      - POSTGRES_DB=${POSTGRES_DB:-zentryc}
      - POSTGRES_USER=${POSTGRES_USER:-zentryc}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ChangeMeNow!}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-default}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-ChangeMeNow!}
      - WORKERS=${WORKERS:-4}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_FILE=logs/zentryc.log
    volumes:
      - zentryc-logs:/app/logs
      - zentryc-credentials:/app/data/credentials
    tmpfs:
      - /tmp:size=256M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/api/health/simple"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      pgbouncer:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      frontend:
        aliases:
          - web
      backend:
        aliases:
          - web

  # ---------------------------------------------------------------------------
  # Syslog - UDP collector (same image, different mode)
  # ---------------------------------------------------------------------------
  syslog:
    image: zentryc:latest
    restart: unless-stopped
    command: ["syslog"]
    environment:
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=6432
      - POSTGRES_DB=${POSTGRES_DB:-zentryc}
      - POSTGRES_USER=${POSTGRES_USER:-zentryc}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ChangeMeNow!}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-default}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-ChangeMeNow!}
      - SYSLOG_PORT=${SYSLOG_PORT:-514}
      - SYSLOG_BATCH_SIZE=${SYSLOG_BATCH_SIZE:-5000}
      - SYSLOG_FLUSH_INTERVAL=${SYSLOG_FLUSH_INTERVAL:-2.0}
      - SYSLOG_CACHE_TTL=${SYSLOG_CACHE_TTL:-60}
      - SYSLOG_WORKERS=${SYSLOG_WORKERS:-4}
      - SYSLOG_MAX_BUFFER=${SYSLOG_MAX_BUFFER:-100000}
      - SYSLOG_METRICS_INTERVAL=${SYSLOG_METRICS_INTERVAL:-30}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=logs/zentryc.log
    ports:
      - "${SYSLOG_EXTERNAL_PORT:-514}:514/udp"
    volumes:
      - zentryc-logs:/app/logs
    tmpfs:
      - /tmp:size=256M
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f run_syslog"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      web:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - frontend
      - backend

  # ---------------------------------------------------------------------------
  # Nginx - Reverse proxy (frontend-facing)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    entrypoint: ["/docker-entrypoint-zentryc.sh"]
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx-entrypoint.sh:/docker-entrypoint-zentryc.sh:ro
      - zentryc-certs:/etc/nginx/certs
    tmpfs:
      - /tmp:size=64M
      - /var/cache/nginx:size=128M
      - /run:size=16M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      web:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - frontend

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - backend

volumes:
  postgres-data:
  clickhouse-data:
  redis-data:
  prometheus-data:
  zentryc-logs:
  zentryc-credentials:
  zentryc-certs:

networks:
  # Frontend: nginx <-> web (only web and nginx can talk)
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET_FRONTEND:-10.200.0.0/24}
  # Backend: web/syslog <-> postgres/clickhouse/redis (databases isolated from internet)
  backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET_BACKEND:-10.200.1.0/24}
