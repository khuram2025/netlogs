<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentryc — Authenticate</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border: #334155;
            --input-bg: #020617;
            --danger: #ef4444;
            --glow: rgba(59, 130, 246, 0.15);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated grid background ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            z-index: 0;
        }

        /* Radial sweep / radar ping */
        .bg-sweep {
            position: fixed;
            width: 900px;
            height: 900px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                transparent 340deg,
                rgba(59, 130, 246, 0.06) 355deg,
                transparent 360deg
            );
            animation: sweep 6s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes sweep {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Concentric rings */
        .bg-rings {
            position: fixed;
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(59, 130, 246, 0.06);
            z-index: 0;
            pointer-events: none;
        }
        .bg-rings::before,
        .bg-rings::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(59, 130, 246, 0.04);
        }
        .bg-rings::before {
            inset: 60px;
        }
        .bg-rings::after {
            inset: 140px;
        }

        /* ── Login card ── */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }
        }

        .login-card {
            background: linear-gradient(170deg, rgba(30, 41, 59, 0.92) 0%, rgba(15, 23, 42, 0.96) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2.25rem 2rem;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(59, 130, 246, 0.05),
                0 24px 48px -12px rgba(0, 0, 0, 0.5),
                0 0 80px -20px rgba(59, 130, 246, 0.08);
            position: relative;
            overflow: hidden;
        }

        /* Top accent bar */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        /* ── Brand header ── */
        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(59, 130, 246, 0.04));
            border: 1px solid rgba(59, 130, 246, 0.15);
            margin-bottom: 1rem;
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.1); }
            50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
        }

        .brand-icon svg {
            width: 28px;
            height: 28px;
            color: var(--primary);
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 0.375rem;
        }

        .brand-name span {
            color: var(--primary);
        }

        .brand-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
        }

        /* ── Error banner ── */
        .error-banner {
            display: flex;
            align-items: flex-start;
            gap: 0.625rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            margin-bottom: 1.25rem;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(2px); }
        }

        .error-banner svg {
            width: 18px;
            height: 18px;
            color: var(--danger);
            flex-shrink: 0;
            margin-top: 1px;
        }

        .error-banner p {
            font-size: 0.8rem;
            color: #fca5a5;
            line-height: 1.45;
        }

        /* ── Form fields ── */
        .form-group {
            margin-bottom: 1.125rem;
        }

        .form-label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.675rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: #475569;
            transition: color 0.2s;
            pointer-events: none;
        }

        .form-input {
            display: block;
            width: 100%;
            padding: 0.7rem 0.875rem 0.7rem 2.625rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            color: white;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 9px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input::placeholder {
            color: #334155;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        .form-input:focus + svg,
        .input-wrapper:focus-within svg {
            color: var(--primary);
        }

        /* ── Checkbox row ── */
        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            margin-top: -0.25rem;
        }

        .remember-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
        }

        .remember-label input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--input-bg);
            cursor: pointer;
            position: relative;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .remember-label input[type="checkbox"]:checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .remember-label input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 4.5px;
            top: 1.5px;
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 1.5px 1.5px 0;
            transform: rotate(45deg);
        }

        .remember-label span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ── Submit button ── */
        .btn-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            border: none;
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px -8px rgba(59, 130, 246, 0.45);
        }

        .btn-login:hover::before {
            transform: translateX(100%);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login svg {
            width: 16px;
            height: 16px;
        }

        /* ── Footer ── */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(51, 65, 85, 0.4);
        }

        .login-footer p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #475569;
            line-height: 1.6;
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 0.375rem;
            animation: blink 2s ease-in-out infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .login-wrapper {
                padding: 1rem;
            }
            .login-card {
                padding: 2rem 1.5rem 1.5rem;
                border-radius: 12px;
            }
            .bg-sweep, .bg-rings {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-sweep"></div>
    <div class="bg-rings"></div>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- Brand -->
            <div class="brand-header">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        <path d="M9 12l2 2 4-4" opacity="0.7"/>
                    </svg>
                </div>
                <div class="brand-name">Zen<span>tryc</span></div>
                <div class="brand-sub">SOAR / SIEM Platform</div>
            </div>

            <!-- Error -->
            {% if error %}
            <div class="error-banner">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <p>{{ error }}</p>
            </div>
            {% endif %}

            <!-- Form -->
            <form method="POST" action="/auth/login" autocomplete="on">
                <input type="hidden" name="next_url" value="{{ next_url }}">

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <div class="input-wrapper">
                        <input
                            id="username"
                            name="username"
                            type="text"
                            class="form-input"
                            placeholder="Enter username"
                            value="{{ username or '' }}"
                            autocomplete="username"
                            autofocus
                            required
                        >
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <input
                            id="password"
                            name="password"
                            type="password"
                            class="form-input"
                            placeholder="Enter password"
                            autocomplete="current-password"
                            required
                        >
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                </div>

                <div class="options-row">
                    <label class="remember-label">
                        <input type="checkbox" name="remember_me" value="on">
                        <span>Remember this session</span>
                    </label>
                </div>

                <button type="submit" class="btn-login">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    Authenticate
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p><span class="status-dot"></span>System Online &mdash; Secured Connection</p>
            </div>

        </div>
    </div>

<script>
/* CSRF — auto-inject into forms */
(function() {
    function getCsrfToken() {
        var m = document.cookie.match(/zentryc_csrf=([^;]+)/);
        return m ? decodeURIComponent(m[1]) : '';
    }
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('form').forEach(function(f) {
            if (!f.querySelector('input[name="csrf_token"]')) {
                var inp = document.createElement('input');
                inp.type = 'hidden'; inp.name = 'csrf_token'; inp.value = getCsrfToken();
                f.appendChild(inp);
            }
        });
    });
})();
</script>
</body>
</html>
